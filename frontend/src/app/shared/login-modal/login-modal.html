<!-- Overlay -->
<div *ngIf="isOpen"
     class="fixed inset-0 z-[2000] flex items-center justify-center bg-black/40 backdrop-blur-[2px] transition-all duration-300"
     (click)="onOverlayClick($event)">

  <!-- Modal -->
  <div class="relative mx-4 w-full max-w-[420px] bg-white shadow-[0_24px_64px_rgba(0,0,0,0.14)]"
       (click)="$event.stopPropagation()">

    <!-- Franja dorada superior -->
    <div class="h-[3px] w-full bg-[#c4956a]"></div>

    <!-- Cabecera -->
    <div class="flex items-start justify-between px-10 pt-9 pb-2">
      <div>
        <p class="font-serif text-[0.65rem] font-normal uppercase tracking-[0.22em] text-[#c4956a]">Bienvenida</p>
        <h2 class="mt-1 font-serif text-[1.55rem] font-bold uppercase leading-none tracking-[0.08em] text-[#1a1a1a]">
          Acceder
        </h2>
      </div>
      <button (click)="close()"
              class="mt-1 cursor-pointer border-none bg-transparent p-1 text-[#aaa] transition-colors duration-200 hover:text-[#1a1a1a]"
              aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M1 1l16 16M17 1L1 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Separador -->
    <div class="mx-10 mt-4 h-px bg-black/[0.07]"></div>

    <!-- Formulario -->
    <form class="px-10 pt-7 pb-9" (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <!-- Email -->
      <div class="mb-5">
        <label class="mb-2 block font-serif text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-[#1a1a1a]">
          Correo electrónico
        </label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          placeholder="tu@correo.com"
          class="w-full border border-black/[0.12] bg-[#fafafa] px-4 py-3 font-serif text-[0.88rem] text-[#1a1a1a] outline-none transition-all duration-200 placeholder:text-[#bbb] focus:border-[#c4956a] focus:bg-white focus:shadow-[0_0_0_3px_rgba(196,149,106,0.10)]"
        />
      </div>

      <!-- Contraseña -->
      <div class="mb-2">
        <label class="mb-2 block font-serif text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-[#1a1a1a]">
          Contraseña
        </label>
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="••••••••"
            class="w-full border border-black/[0.12] bg-[#fafafa] px-4 py-3 pr-12 font-serif text-[0.88rem] text-[#1a1a1a] outline-none transition-all duration-200 placeholder:text-[#bbb] focus:border-[#c4956a] focus:bg-white focus:shadow-[0_0_0_3px_rgba(196,149,106,0.10)]"
          />
          <button type="button"
                  (click)="showPassword = !showPassword"
                  class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer border-none bg-transparent p-0 text-[#aaa] transition-colors hover:text-[#c4956a]"
                  [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Olvidé contraseña -->
      <div class="mb-7 text-right">
        <button type="button"
                class="cursor-pointer border-none bg-transparent p-0 font-serif text-[0.72rem] text-[#c4956a] underline-offset-2 transition-colors hover:underline">
          ¿Olvidaste tu contraseña?
        </button>
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="errorMsg"
           class="mb-5 border border-red-200 bg-red-50 px-4 py-3 font-serif text-[0.78rem] text-red-600">
        {{ errorMsg }}
      </div>

      <!-- Botón principal -->
      <button type="submit"
              [disabled]="isLoading"
              class="w-full border-[1.5px] border-[#c4956a] bg-[#c4956a] px-6 py-[0.8rem] font-serif text-[0.78rem] font-semibold uppercase tracking-[0.18em] text-white transition-all duration-300 hover:bg-transparent hover:text-[#c4956a] disabled:opacity-60 disabled:cursor-not-allowed">
        <span *ngIf="!isLoading">Iniciar sesión</span>
        <span *ngIf="isLoading">Accediendo…</span>
      </button>

      <!-- Separador -->
      <div class="my-6 flex items-center gap-3">
        <div class="flex-1 h-px bg-black/[0.08]"></div>
        <span class="font-serif text-[0.65rem] uppercase tracking-[0.14em] text-[#bbb]">o</span>
        <div class="flex-1 h-px bg-black/[0.08]"></div>
      </div>

      <!-- Registro -->
      <p class="text-center font-serif text-[0.78rem] text-[#666]">
        ¿Aún no tienes cuenta?
        <button type="button"
                (click)="switchToRegister()"
                class="cursor-pointer border-none bg-transparent p-0 font-serif text-[0.78rem] font-semibold text-[#c4956a] transition-colors hover:text-[#a07850]">
          Crear cuenta
        </button>
      </p>

    </form>
  </div>
</div>

<!-- Modal Registro -->
<div *ngIf="isRegisterOpen"
     class="fixed inset-0 z-[2000] flex items-center justify-center bg-black/40 backdrop-blur-[2px]"
     (click)="onOverlayClick($event)">

  <div class="relative mx-4 w-full max-w-[420px] bg-white shadow-[0_24px_64px_rgba(0,0,0,0.14)]"
       (click)="$event.stopPropagation()">

    <div class="h-[3px] w-full bg-[#c4956a]"></div>

    <div class="flex items-start justify-between px-10 pt-9 pb-2">
      <div>
        <p class="font-serif text-[0.65rem] font-normal uppercase tracking-[0.22em] text-[#c4956a]">Únete</p>
        <h2 class="mt-1 font-serif text-[1.55rem] font-bold uppercase leading-none tracking-[0.08em] text-[#1a1a1a]">
          Crear cuenta
        </h2>
      </div>
      <button (click)="closeAll()"
              class="mt-1 cursor-pointer border-none bg-transparent p-1 text-[#aaa] transition-colors hover:text-[#1a1a1a]"
              aria-label="Cerrar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M1 1l16 16M17 1L1 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="mx-10 mt-4 h-px bg-black/[0.07]"></div>

    <form class="px-10 pt-7 pb-9" (ngSubmit)="onRegister()" #registerForm="ngForm">

      <div class="mb-5">
        <label class="mb-2 block font-serif text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-[#1a1a1a]">Nombre completo</label>
        <input type="text" name="nombre" [(ngModel)]="registerName" required placeholder="Tu nombre"
               class="w-full border border-black/[0.12] bg-[#fafafa] px-4 py-3 font-serif text-[0.88rem] text-[#1a1a1a] outline-none transition-all duration-200 placeholder:text-[#bbb] focus:border-[#c4956a] focus:bg-white focus:shadow-[0_0_0_3px_rgba(196,149,106,0.10)]"/>
      </div>

      <div class="mb-5">
        <label class="mb-2 block font-serif text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-[#1a1a1a]">Correo electrónico</label>
        <input type="email" name="registerEmail" [(ngModel)]="registerEmail" required placeholder="tu@correo.com"
               class="w-full border border-black/[0.12] bg-[#fafafa] px-4 py-3 font-serif text-[0.88rem] text-[#1a1a1a] outline-none transition-all duration-200 placeholder:text-[#bbb] focus:border-[#c4956a] focus:bg-white focus:shadow-[0_0_0_3px_rgba(196,149,106,0.10)]"/>
      </div>

      <div class="mb-7">
        <label class="mb-2 block font-serif text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-[#1a1a1a]">Contraseña</label>
        <input type="password" name="registerPassword" [(ngModel)]="registerPassword" required placeholder="Mínimo 8 caracteres"
               class="w-full border border-black/[0.12] bg-[#fafafa] px-4 py-3 font-serif text-[0.88rem] text-[#1a1a1a] outline-none transition-all duration-200 placeholder:text-[#bbb] focus:border-[#c4956a] focus:bg-white focus:shadow-[0_0_0_3px_rgba(196,149,106,0.10)]"/>
      </div>

      <button type="submit"
              class="w-full border-[1.5px] border-[#c4956a] bg-[#c4956a] px-6 py-[0.8rem] font-serif text-[0.78rem] font-semibold uppercase tracking-[0.18em] text-white transition-all duration-300 hover:bg-transparent hover:text-[#c4956a]">
        Crear cuenta
      </button>

      <div class="my-6 flex items-center gap-3">
        <div class="flex-1 h-px bg-black/[0.08]"></div>
        <span class="font-serif text-[0.65rem] uppercase tracking-[0.14em] text-[#bbb]">o</span>
        <div class="flex-1 h-px bg-black/[0.08]"></div>
      </div>

      <p class="text-center font-serif text-[0.78rem] text-[#666]">
        ¿Ya tienes cuenta?
        <button type="button" (click)="switchToLogin()"
                class="cursor-pointer border-none bg-transparent p-0 font-serif text-[0.78rem] font-semibold text-[#c4956a] transition-colors hover:text-[#a07850]">
          Iniciar sesión
        </button>
      </p>

    </form>
  </div>
</div>
