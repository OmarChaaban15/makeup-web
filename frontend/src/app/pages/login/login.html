<div class="flex w-full flex-col bg-[#fafafa] lg:flex-row lg:items-stretch">

  <!-- ══ COLUMNA IZQUIERDA ══ -->
  <!-- Aumentado a py-48 (192px de espacio arriba y abajo en escritorio) -->
  <div class="relative hidden w-full flex-col items-center justify-center bg-[#0a0a0a] px-12 py-32 lg:flex lg:w-1/2 lg:py-48">
    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-[#151515] to-[#0a0a0a]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,rgba(196,149,106,0.15),transparent_60%)]"></div>

    <div class="relative z-10 flex flex-col items-center text-center">
      <p class="font-serif text-[0.7rem] uppercase tracking-[0.3em] text-[#c4956a]">
        Estudio Profesional
      </p>
      <h2 class="mt-4 font-serif text-[2.8rem] font-bold uppercase leading-none tracking-[0.12em] text-white">
        MAKEUP<br>BY YONA
      </h2>
      
      <div class="my-8 h-px w-24 bg-gradient-to-r from-transparent via-[#c4956a] to-transparent"></div>
      
      <h3 class="font-serif text-2xl font-light italic text-white/90">
        "Realza tu belleza natural"
      </h3>
      <p class="mt-5 max-w-sm text-sm font-light leading-relaxed text-white/60">
        Accede a tu panel personal para gestionar reservas y descubrir servicios exclusivos.
      </p>
    </div>
  </div>

  <!-- ══ COLUMNA DERECHA ══ -->
  <!-- Aumentado a py-40 (160px de espacio arriba y abajo en escritorio) -->
  <div class="relative flex w-full flex-col items-center justify-center px-8 py-24 lg:w-1/2 lg:px-16 lg:py-40 xl:px-24">
    <div class="w-full max-w-md">
      
      <div class="mb-12">
        <h1 class="font-serif text-[2.2rem] font-bold uppercase leading-none tracking-[0.05em] text-[#1a1a1a]">
          Bienvenida
        </h1>
        <p class="mt-3 text-sm text-[#666]">Ingresa tus credenciales para acceder a tu cuenta.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-8">

        <div>
          <label class="mb-2 block font-serif text-[0.7rem] font-semibold uppercase tracking-[0.15em] text-[#1a1a1a]">
            Correo electrónico
          </label>
          <input type="email" formControlName="email" placeholder="tu@correo.com"
                 class="w-full border-b border-black/[0.12] bg-transparent pb-3 pt-2 text-[0.95rem] text-[#1a1a1a] outline-none transition-all duration-300 placeholder:text-[#bbb] focus:border-[#c4956a] focus:ring-0"
                 [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"/>
        </div>

        <div>
          <div class="mb-2 flex items-center justify-between">
            <label class="block font-serif text-[0.7rem] font-semibold uppercase tracking-[0.15em] text-[#1a1a1a]">
              Contraseña
            </label>
            <button type="button" class="text-xs text-[#c4956a] transition-colors hover:text-[#1a1a1a]">
              ¿Olvidaste tu contraseña?
            </button>
          </div>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
                   class="w-full border-b border-black/[0.12] bg-transparent pb-3 pt-2 pr-10 text-[0.95rem] text-[#1a1a1a] outline-none transition-all duration-300 placeholder:text-[#bbb] focus:border-[#c4956a] focus:ring-0"
                   [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"/>
            <button type="button" (click)="togglePasswordVisibility()"
                    class="absolute right-0 top-1/2 -translate-y-1/2 p-2 text-[#aaa] hover:text-[#c4956a]">
              <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div *ngIf="errorMsg" class="rounded-sm border-l-2 border-red-500 bg-red-50 p-3 text-sm text-red-600">
          {{ errorMsg }}
        </div>
        <div *ngIf="successMsg" class="rounded-sm border-l-2 border-green-500 bg-green-50 p-3 text-sm text-green-600">
          {{ successMsg }}
        </div>

        <button type="submit" [disabled]="isLoading || loginForm.invalid"
                class="mt-4 w-full bg-[#1a1a1a] px-6 py-4 font-serif text-[0.8rem] font-semibold uppercase tracking-[0.2em] text-white transition-all duration-300 hover:bg-[#c4956a] disabled:opacity-50">
          <span *ngIf="!isLoading">Iniciar sesión</span>
          <span *ngIf="isLoading">Accediendo...</span>
        </button>
      </form>

      <div class="mt-14 border-t border-black/[0.05] pt-8 text-center">
        <p class="text-sm text-[#666]">
          ¿Aún no tienes cuenta? 
          <a routerLink="/registro" class="font-medium text-[#1a1a1a] transition-colors hover:text-[#c4956a]">Crear cuenta</a>
        </p>
      </div>
    </div>
  </div>
</div>
